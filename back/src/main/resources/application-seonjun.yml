spring:
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true # 원격 접속 허용
        trace: false # h2콘솔 log에 찍기

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://database-giju.c54g8qaouy1y.ap-northeast-2.rds.amazonaws.com:3306/giju?useUnicode=true&serverTimezone=Asia/Seoul
    username: root
    password: root1234


  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        show_sql: true
        format_sql: true

    defer-datasource-initialization: true

  sql:
    init:
      mode: never

app:
  base-url: https://giju.vercel.app

front:
  uri: ${FRONT_URI:https://giju-front.vercel.app}
#  uri: ${FRONT_URI:http://localhost:3000}